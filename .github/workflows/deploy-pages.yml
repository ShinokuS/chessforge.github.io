name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build engine & AI
        run: pnpm --filter @chessforge/engine build && pnpm --filter @chessforge/ai build

      - name: Build client
        env:
          # Project site: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          # Optional: wss://your-relay.example.com/ws (repo Actions variable)
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: pnpm --filter @chessforge/client build

      - name: SPA fallback + disable Jekyll
        run: |
          cp packages/client/dist/index.html packages/client/dist/404.html
          touch packages/client/dist/.nojekyll

      # Publish built static site to gh-pages branch (classic Pages source).
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/client/dist
          force_orphan: true
          enable_jekyll: false
