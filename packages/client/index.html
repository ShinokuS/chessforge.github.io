<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chessforge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">Загрузка Chessforge…</div>
    <script>
      // If the JS bundle never loads (wrong base / 404), surface it instead of spinning forever.
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && /Загрузка Chessforge/.test(root.textContent || '')) {
          root.innerHTML =
            '<div style="margin:2rem;font-family:system-ui;max-width:36rem;color:#e8edd8">' +
            '<h1 style="font-size:1.25rem">Не загрузились скрипты</h1>' +
            '<p>Откройте консоль (F12 → Network) и проверьте, что <code>assets/*.js</code> отдаётся с кодом 200.</p>' +
            '<p style="opacity:.75;font-size:.9rem">Ожидаемый адрес: страница репозитория GitHub Pages с завершающим <code>/</code>.</p>' +
            '</div>';
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
