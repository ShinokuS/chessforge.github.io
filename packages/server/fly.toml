# Example Fly.io config for the Chessforge WS relay.
# fly launch --dockerignore-from-dockerfile
# fly deploy

app = "chessforge-relay"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
